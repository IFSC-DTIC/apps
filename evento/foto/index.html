<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Molduras - IFSC</title>
    
    <!-- SEO & Social Meta Tags -->
    <meta name="description" content="Personalize sua foto com a moldura oficial do I Seminário de IA do IFSC.">
    <meta property="og:title" content="Gerador de Molduras - IFSC">
    <meta property="og:description" content="Personalize sua foto com a moldura oficial do I Seminário de IA do IFSC.">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#32a041">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-T49JX2YJMT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-T49JX2YJMT');
    </script>

    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --ifsc-green: #32a041;
            --ifsc-dark: #1e293b;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }

        /* Full-screen iframe */
        #app-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: transparent;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* Loading Screen */
        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #f1f5f9;
            border-top: 4px solid var(--ifsc-green);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loader p {
            color: var(--ifsc-dark);
            font-weight: 600;
            font-size: 1rem;
            margin: 0;
        }

        .loaded #loader {
            opacity: 0;
            pointer-events: none;
        }

        .loaded #app-iframe {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <p>Iniciando Gerador de Molduras...</p>
    </div>

    <!-- 
        BOAS PRÁTICAS IFRAME:
        - camera e clipboard são vitais para apps de foto (Lovable).
        - allow-same-origin é necessário para o Vite/React do Lovable carregar corretamente (local storage, hooks, etc).
        - loading="eager" por ser o conteúdo central.
    -->
    <iframe 
        id="app-iframe"
        src="https://pic-framing-buddy.lovable.app" 
        title="Gerador de Molduras do I Seminário de IA do IFSC"
        allow="camera; microphone; clipboard-write; clipboard-read; display-capture; web-share"
        sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-downloads allow-modals allow-top-navigation-by-user-activation"
        loading="eager"
        allowfullscreen>
    </iframe>

    <script>
        const iframe = document.getElementById('app-iframe');
        
        // Remove o estado de carregamento quando o iframe carregar
        iframe.onload = () => {
            document.body.classList.add('loaded');
        };

        // Fallback de segurança: oculta o loader após 12 segundos se o evento 'load' falhar
        setTimeout(() => {
            if (!document.body.classList.contains('loaded')) {
                document.body.classList.add('loaded');
            }
        }, 12000);
    </script>
</body>
</html>
