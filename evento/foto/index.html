<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Molduras - IFSC</title>
    
    <!-- SEO & Social Meta Tags -->
    <meta name="description" content="Personalize sua foto com a moldura oficial do I Seminário de IA do IFSC.">
    <meta property="og:title" content="Gerador de Molduras - IFSC">
    <meta property="og:description" content="Personalize sua foto com a moldura oficial do I Seminário de IA do IFSC.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://apps.ifsc.edu.br/icon.png"> <!-- Fallback icon if exists -->
    <meta name="theme-color" content="#32a041">

    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">

    <style>
        :root {
            --ifsc-green: #32a041;
            --ifsc-dark: #1e293b;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #f8fafc;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* Loading Screen */
        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            z-index: 100;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e2e8f0;
            border-top: 5px solid var(--ifsc-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loader p {
            color: var(--ifsc-dark);
            font-weight: 600;
            font-size: 1.1rem;
            margin: 0;
        }

        /* iframe styling */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .hidden {
            opacity: 0;
            visibility: hidden;
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <p>Carregando Aplicativo...</p>
    </div>

    <!-- 
        Boas Práticas de iframe:
        1. allow: habilitando permissões necessárias para apps de foto (câmera, clipboard)
        2. loading="eager": Prioridade máxima para o conteúdo principal
        3. title: Acessibilidade
        4. sandbox: permitindo o necessário para o Lovable funcionar (scripts, forms, popups, downloads)
    -->
    <iframe 
        id="app-iframe"
        src="https://pic-framing-buddy.lovable.app" 
        title="Gerador de Molduras - IFSC"
        allow="camera; microphone; display-capture; clipboard-write; clipboard-read; screen-wake-lock; web-share"
        sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-downloads allow-modals"
        loading="eager"
        allowfullscreen>
    </iframe>

    <script>
        const iframe = document.getElementById('app-iframe');
        const loader = document.getElementById('loader');

        // Remove o loader quando o iframe terminar de carregar
        iframe.addEventListener('load', () => {
            loader.classList.add('hidden');
        });

        // Fallback para remover o loader caso o 'load' demore demais (15s) ou erro de conexão
        setTimeout(() => {
            if (loader) {
                loader.classList.add('hidden');
            }
        }, 15000);
    </script>
</body>
</html>
